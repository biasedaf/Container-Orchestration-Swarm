# Nginx Configuration - Dashboard + Reverse Proxy
# =================================================
# Serves:
#   /               -> Dashboard (static HTML)
#   /api/           -> Load Balancer (Algorithm 2) -> Backend
#   /orchestrator/  -> Orchestrator API (Algorithm 1)
#   /lb/            -> Load Balancer status API
#
# The key change: Nginx no longer does load balancing itself.
# Instead, it proxies to the Memory-Based Load Balancer (Algorithm 2)
# which routes requests based on container memory usage.

server {
    listen 80;
    server_name localhost;

    # Docker's internal DNS resolver for service discovery
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Dashboard - served as static HTML
    location = / {
        root /usr/share/nginx/html;
        try_files /dashboard.html =404;
    }

    # API endpoints - proxied to Load Balancer (Algorithm 2)
    # The LB then routes to the backend with lowest memory usage
    location /api/ {
        set $lb_service http://loadbalancer:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $lb_service;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Load Balancer status API (Algorithm 2 diagnostics)
    location /lb/ {
        set $lb_service http://loadbalancer:8080;
        rewrite ^/lb/(.*) /$1 break;
        proxy_pass $lb_service;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Orchestrator API (Algorithm 1 diagnostics)
    location /orchestrator/ {
        set $orch_service http://orchestrator:8081;
        rewrite ^/orchestrator/(.*) /$1 break;
        proxy_pass $orch_service;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "Nginx is healthy\n";
        add_header Content-Type text/plain;
    }

    location /nginx-status {
        stub_status on;
        access_log off;
    }
}
